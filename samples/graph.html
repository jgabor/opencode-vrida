<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Map Rig — Vrida</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0A0A0A; --ink: #141414; --charcoal: #1C1C1C; --graphite: #2A2A2A;
      --steel: #444; --ash: #666; --silver: #999; --fog: #CCC;
      --bone: #E8E8E8; --white: #F5F5F5; --pure: #FFFFFF;
      --accent: #FF3D00; --accent-dim: rgba(255,61,0,0.12);
      --cyan: #00E5CC; --cyan-dim: rgba(0,229,204,0.10);
      --border: #2A2A2A;
      --client: #60a5fa; --server: #34d399; --data: #fbbf24;
      --external: #f87171; --infra: #a78bfa;
      --font-display: 'Space Grotesk','Helvetica Neue','Arial Black',sans-serif;
      --font-body: 'IBM Plex Sans','Helvetica Neue',Helvetica,Arial,sans-serif;
      --font-mono: 'IBM Plex Mono','JetBrains Mono','SF Mono',Consolas,monospace;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    body { font-family: var(--font-body); background: var(--black); color: var(--white); height: 100vh; display: flex; flex-direction: column; overflow: hidden; -webkit-font-smoothing: antialiased; }

    header { background: var(--ink); padding: 0 24px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 10; height: 52px; }
    header h1 { font-family: var(--font-display); font-size: 14px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; display: flex; align-items: center; gap: 10px; }
    .title-mark { display: inline-block; width: 3px; height: 18px; background: var(--accent); }

    .presets { display: flex; gap: 2px; flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; margin-left: auto; }
    .presets::-webkit-scrollbar { display: none; }
    .presets button { background: transparent; color: var(--silver); border: none; padding: 6px 14px; font-family: var(--font-mono); font-size: 11px; font-weight: 500; cursor: pointer; transition: color 0.15s, background 0.15s; white-space: nowrap; letter-spacing: 0.02em; position: relative; }
    .presets button:hover { color: var(--white); background: var(--graphite); }
    .presets button.active { color: var(--accent); background: var(--accent-dim); }
    .presets button.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--accent); }

    .main { display: flex; flex: 1; overflow: hidden; position: relative; z-index: 1; }

    .controls { background: var(--ink); border-right: 1px solid var(--border); overflow-y: auto; padding: 20px; width: 240px; flex-shrink: 0; z-index: 5; scrollbar-width: thin; scrollbar-color: var(--graphite) transparent; }
    .controls::-webkit-scrollbar { width: 4px; }
    .controls::-webkit-scrollbar-track { background: transparent; }
    .controls::-webkit-scrollbar-thumb { background: var(--graphite); }

    .map-area { flex: 1; display: flex; overflow: hidden; min-width: 0; }
    .svg-container { flex: 1; min-width: 0; overflow: hidden; position: relative; cursor: grab; background: var(--black); }
    .svg-container.grabbing { cursor: grabbing; }

    .comments-panel { background: var(--ink); border-left: 1px solid var(--border); overflow-y: auto; padding: 20px; width: 260px; flex-shrink: 0; z-index: 5; }
    .comments-panel h3 { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ash); margin-bottom: 14px; font-weight: 500; }

    .control-group { margin-bottom: 20px; animation: fadeIn 0.4s ease-out both; }
    .control-group:nth-child(1) { animation-delay: 0.05s; }
    .control-group:nth-child(2) { animation-delay: 0.10s; }
    .control-group:nth-child(3) { animation-delay: 0.15s; }
    .control-group h3 { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ash); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); font-weight: 500; }

    .cb-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; color: var(--fog); }
    .cb-row .dot { width: 10px; height: 10px; flex-shrink: 0; }
    .cb-row input { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }

    .zoom-controls { display: flex; gap: 4px; align-items: center; margin-top: 12px; }
    .zoom-controls button { background: var(--charcoal); color: var(--silver); border: 1px solid var(--border); width: 28px; height: 28px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.12s; font-weight: 500; font-family: var(--font-mono); }
    .zoom-controls button:hover { color: var(--white); border-color: var(--accent); }
    .zoom-controls span { font-size: 11px; font-weight: 500; color: var(--silver); min-width: 44px; text-align: center; font-family: var(--font-mono); }

    .comment-card { background: var(--charcoal); border: 1px solid var(--border); padding: 12px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.12s; }
    .comment-card:hover { border-color: var(--steel); }
    .comment-card .node-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--white); }
    .comment-card .comment-text { font-size: 12px; color: var(--silver); line-height: 1.5; }
    .comment-card .delete-btn { float: right; background: none; border: none; color: var(--steel); cursor: pointer; font-size: 14px; padding: 0 4px; transition: color 0.12s; }
    .comment-card .delete-btn:hover { color: var(--accent); }

    .comment-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: var(--ink); border: 1px solid var(--border); padding: 24px; z-index: 100; min-width: 340px; }
    .comment-modal h3 { font-family: var(--font-display); font-size: 15px; font-weight: 600; margin-bottom: 14px; }
    .comment-modal textarea { width: 100%; background: var(--black); border: 1px solid var(--border); color: var(--pure); padding: 10px; font-size: 13px; resize: vertical; min-height: 80px; font-family: var(--font-body); line-height: 1.5; transition: border-color 0.15s; outline: none; border-radius: 0; }
    .comment-modal textarea:focus { border-color: var(--accent); }
    .comment-modal .modal-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
    .comment-modal button { padding: 7px 16px; font-family: var(--font-mono); font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); transition: all 0.12s; letter-spacing: 0.04em; text-transform: uppercase; }
    .comment-modal .save-btn { background: var(--pure); color: var(--black); border-color: var(--pure); }
    .comment-modal .save-btn:hover { background: var(--accent); border-color: var(--accent); color: var(--pure); }
    .comment-modal .cancel-btn { background: var(--charcoal); color: var(--silver); }
    .comment-modal .cancel-btn:hover { color: var(--white); }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 99; }

    .no-comments { font-size: 12px; color: var(--steel); }

    svg text { user-select: none; }

    .prompt-bar { background: var(--ink); border-top: 1px solid var(--border); padding: 12px 24px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; z-index: 10; max-height: 260px; }
    .prompt-header { display: flex; justify-content: space-between; align-items: center; }
    .prompt-title { font-family: var(--font-mono); font-size: 10px; color: var(--ash); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 500; }
    .prompt-bar pre { flex: 1; width: 100%; font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; color: var(--fog); overflow-y: auto; max-height: 160px; font-family: var(--font-mono); background: var(--black); padding: 12px 14px; border: 1px solid var(--border); margin: 0; }
    #copy-btn { background: var(--pure); color: var(--black); border: none; padding: 5px 16px; font-family: var(--font-mono); font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.12s; letter-spacing: 0.04em; text-transform: uppercase; }
    #copy-btn:hover { background: var(--accent); color: var(--pure); }
    #copy-btn.copied { background: var(--cyan); color: var(--black); }

    .panel-tabs { display: none; }
    @media (max-width: 640px) {
      .panel-tabs { display: flex; position: fixed; bottom: 0; left: 0; right: 0; height: 56px; background: var(--ink); border-top: 1px solid var(--border); z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
      .panel-tab { flex: 1; padding: 6px 4px 8px; background: none; border: none; color: var(--steel); font-family: var(--font-mono); font-size: 9px; font-weight: 600; cursor: pointer; border-top: 2px solid transparent; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; letter-spacing: 0.1em; text-transform: uppercase; }
      .panel-tab .tab-icon { font-size: 16px; line-height: 1; }
      .panel-tab.active { color: var(--accent); border-top-color: var(--accent); }
      header { flex-wrap: wrap; padding: 0 16px; height: auto; min-height: 48px; gap: 8px; padding-top: 10px; padding-bottom: 10px; }
      header h1 { font-size: 12px; }
      .presets { width: 100%; margin-left: 0; gap: 0; }
      .presets button { font-size: 10px; padding: 4px 10px; }
      .main { flex-direction: column; height: auto; flex: 1; }
      .controls { width: 100%; border-right: none; border-bottom: none; }
      .panel { display: none; }
      .controls.panel.active { display: block; flex: 1; overflow-y: auto; padding-bottom: 76px; }
      .map-area.panel.active { display: flex; flex: 1; flex-direction: column; padding-bottom: 76px; }
      .map-area.panel.active .svg-container { flex: 1; min-height: 280px; border-bottom: 1px solid var(--border); }
      .map-area.panel.active .comments-panel { width: 100%; height: 250px; border-left: none; flex-shrink: 0; }
      .prompt-bar { display: none; border-top: none; }
      .prompt-bar.panel.active { display: flex; flex: 1; max-height: none; flex-direction: column; padding-bottom: 76px; }
      .prompt-bar pre { max-height: none; }
      body[data-active-panel="prompt"] .main { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1><span class="title-mark"></span>Code Map</h1>
    <div class="presets" id="presets"></div>
  </header>
  <div class="panel-tabs">
    <button class="panel-tab active" data-panel="controls" onclick="showPanel('controls')"><span class="tab-icon">—</span>Layers</button>
    <button class="panel-tab" data-panel="map" onclick="showPanel('map')"><span class="tab-icon">◻</span>Map</button>
    <button class="panel-tab" data-panel="prompt" onclick="showPanel('prompt')"><span class="tab-icon">▤</span>Prompt</button>
  </div>
  <div class="main">
    <div class="controls panel active" id="panel-controls"></div>
    <div class="map-area panel" id="panel-map">
      <div class="svg-container" id="svg-container"></div>
      <div class="comments-panel" id="comments-panel">
        <h3>Comments</h3>
        <div id="comments-list"><p class="no-comments">Click a node to add a comment.</p></div>
      </div>
    </div>
  </div>
  <div class="prompt-bar panel" id="panel-prompt">
    <div class="prompt-header">
      <span class="prompt-title">Generated Prompt</span>
      <button id="copy-btn" onclick="copyPrompt()">Copy</button>
    </div>
    <pre id="prompt-text"></pre>
  </div>

  <script>
    const LAYER_COLORS = { client: '#60a5fa', server: '#34d399', data: '#fbbf24', external: '#f87171', infra: '#a78bfa' };
    const LAYER_NAMES = { client: 'Client', server: 'Server', data: 'Data', external: 'External', infra: 'Infrastructure' };
    const CONN_STYLES = { http: { color: '#60a5fa', dash: '', label: 'HTTP/REST' }, ws: { color: '#34d399', dash: '8,4', label: 'WebSocket' }, db: { color: '#fbbf24', dash: '4,4', label: 'DB Query' }, event: { color: '#f87171', dash: '8,4,2,4', label: 'Event/Msg' } };

    const NODES = [
      { id: 'spa', name: 'React SPA', desc: 'Frontend application', layer: 'client', x: 80, y: 60 },
      { id: 'sw', name: 'Service Worker', desc: 'Offline & caching', layer: 'client', x: 380, y: 60 },
      { id: 'gateway', name: 'API Gateway', desc: 'Request routing', layer: 'server', x: 80, y: 200 },
      { id: 'api', name: 'Express API', desc: 'Business logic', layer: 'server', x: 380, y: 200 },
      { id: 'auth', name: 'Auth Service', desc: 'JWT & sessions', layer: 'server', x: 650, y: 200 },
      { id: 'postgres', name: 'PostgreSQL', desc: 'Primary database', layer: 'data', x: 80, y: 340 },
      { id: 'redis', name: 'Redis', desc: 'Cache & pub/sub', layer: 'data', x: 380, y: 340 },
      { id: 'payment', name: 'Stripe', desc: 'Payment processing', layer: 'external', x: 80, y: 480 },
      { id: 'email', name: 'SendGrid', desc: 'Email delivery', layer: 'external', x: 380, y: 480 },
      { id: 'cdn', name: 'CDN', desc: 'Static assets', layer: 'infra', x: 650, y: 60 },
      { id: 'monitor', name: 'Monitoring', desc: 'Logs & alerts', layer: 'infra', x: 650, y: 340 },
    ];

    const CONNECTIONS = [
      { from: 'spa', to: 'gateway', type: 'http' },
      { from: 'spa', to: 'api', type: 'ws' },
      { from: 'spa', to: 'cdn', type: 'http' },
      { from: 'gateway', to: 'api', type: 'http' },
      { from: 'gateway', to: 'auth', type: 'http' },
      { from: 'api', to: 'postgres', type: 'db' },
      { from: 'api', to: 'redis', type: 'db' },
      { from: 'api', to: 'payment', type: 'http' },
      { from: 'api', to: 'email', type: 'event' },
      { from: 'auth', to: 'redis', type: 'db' },
      { from: 'api', to: 'monitor', type: 'event' },
      { from: 'sw', to: 'api', type: 'http' },
    ];

    const state = {
      layers: { client: true, server: true, data: true, external: true, infra: true },
      connections: { http: true, ws: true, db: true, event: true },
      zoom: 1, panX: 0, panY: 0,
      comments: {}
    };
    let activePreset = 'Full System';
    let draggingNode = null;
    let isPanning = false, panStartX = 0, panStartY = 0;

    const PRESETS = {
      'Full System': { layers: { client: true, server: true, data: true, external: true, infra: true }, connections: { http: true, ws: true, db: true, event: true } },
      'Data Flow': { layers: { client: false, server: true, data: true, external: false, infra: false }, connections: { http: true, ws: true, db: true, event: true } },
      'Client Only': { layers: { client: true, server: false, data: false, external: false, infra: false }, connections: { http: true, ws: true, db: false, event: false } },
      'API Layer': { layers: { client: false, server: true, data: false, external: true, infra: false }, connections: { http: true, ws: true, db: true, event: true } },
      'Dependencies': { layers: { client: false, server: false, data: false, external: true, infra: true }, connections: { http: true, ws: true, db: true, event: true } },
    };

    function buildControls() {
      const c = document.getElementById('panel-controls');
      let html = '<div class="control-group"><h3>Layers</h3>';
      for (const [k, name] of Object.entries(LAYER_NAMES)) {
        html += `<div class="cb-row"><input type="checkbox" data-layer="${k}" ${state.layers[k] ? 'checked' : ''} onchange="toggleLayer('${k}', this.checked)"><span class="dot" style="background:${LAYER_COLORS[k]}"></span><label>${name}</label></div>`;
      }
      html += '</div><div class="control-group"><h3>Connections</h3>';
      for (const [k, v] of Object.entries(CONN_STYLES)) {
        html += `<div class="cb-row"><input type="checkbox" data-conn="${k}" ${state.connections[k] ? 'checked' : ''} onchange="toggleConn('${k}', this.checked)"><span class="dot" style="background:${v.color}"></span><label>${v.label}</label></div>`;
      }
      html += '</div><div class="control-group"><h3>Zoom</h3><div class="zoom-controls"><button onclick="zoomIn()">+</button><span id="zoom-level">' + Math.round(state.zoom * 100) + '%</span><button onclick="zoomOut()">-</button><button onclick="resetZoom()">R</button></div></div>';
      c.innerHTML = html;
    }

    function buildPresets() {
      document.getElementById('presets').innerHTML = Object.keys(PRESETS).map(name =>
        `<button data-preset="${name}" class="${name === activePreset ? 'active' : ''}" onclick="applyPreset('${name}')">${name}</button>`
      ).join('');
    }

    function applyPreset(name) {
      const p = PRESETS[name];
      Object.assign(state.layers, p.layers);
      Object.assign(state.connections, p.connections);
      activePreset = name;
      syncControls(); syncPresetButtons(); updateAll();
      if (window.innerWidth <= 640) showPanel('map');
    }

    function syncControls() {
      document.querySelectorAll('[data-layer]').forEach(el => { el.checked = state.layers[el.dataset.layer]; });
      document.querySelectorAll('[data-conn]').forEach(el => { el.checked = state.connections[el.dataset.conn]; });
    }
    function syncPresetButtons() {
      document.querySelectorAll('.presets button').forEach(b => { b.classList.toggle('active', b.dataset.preset === activePreset); });
    }

    function toggleLayer(k, v) { state.layers[k] = v; activePreset = null; syncPresetButtons(); updateAll(); }
    function toggleConn(k, v) { state.connections[k] = v; activePreset = null; syncPresetButtons(); updateAll(); }
    function zoomIn() { state.zoom = Math.min(2, state.zoom + 0.1); document.getElementById('zoom-level').textContent = Math.round(state.zoom * 100) + '%'; renderSVG(); }
    function zoomOut() { state.zoom = Math.max(0.3, state.zoom - 0.1); document.getElementById('zoom-level').textContent = Math.round(state.zoom * 100) + '%'; renderSVG(); }
    function resetZoom() { state.zoom = 1; state.panX = 0; state.panY = 0; document.getElementById('zoom-level').textContent = '100%'; renderSVG(); }

    function nodeOpacity(node) { return state.layers[node.layer] ? 1 : 0.1; }
    function connOpacity(conn) {
      const fromNode = NODES.find(n => n.id === conn.from);
      const toNode = NODES.find(n => n.id === conn.to);
      if (!state.connections[conn.type]) return 0.08;
      if (!state.layers[fromNode.layer] || !state.layers[toNode.layer]) return 0.08;
      return 0.7;
    }

    function renderSVG() {
      const container = document.getElementById('svg-container');
      const W = container.clientWidth || 800;
      const H = container.clientHeight || 500;
      const NW = 150, NH = 52;

      let svgEl = container.querySelector('svg');
      if (!svgEl) {
        svgEl = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svgEl.setAttribute('width', '100%');
        svgEl.setAttribute('height', '100%');
        container.appendChild(svgEl);
      }

      svgEl.setAttribute('viewBox', `${-state.panX / state.zoom} ${-state.panY / state.zoom} ${W / state.zoom} ${H / state.zoom}`);

      let svgContent = `<defs>`;
      for (const [k, v] of Object.entries(CONN_STYLES)) {
        svgContent += `<marker id="arrow-${k}" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="${v.color}" opacity="0.8"/></marker>`;
      }
      svgContent += `</defs>`;

      for (const conn of CONNECTIONS) {
        const from = NODES.find(n => n.id === conn.from);
        const to = NODES.find(n => n.id === conn.to);
        const cs = CONN_STYLES[conn.type];
        const op = connOpacity(conn);
        const x1 = from.x + NW / 2, y1 = from.y + NH / 2;
        const x2 = to.x + NW / 2, y2 = to.y + NH / 2;
        svgContent += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${cs.color}" stroke-width="2" stroke-dasharray="${cs.dash}" stroke-opacity="${op}" marker-end="url(#arrow-${conn.type})"/>`;
      }

      for (const node of NODES) {
        const op = nodeOpacity(node);
        const lc = LAYER_COLORS[node.layer];
        const hasComment = state.comments[node.id];
        svgContent += `<g class="node" data-id="${node.id}" opacity="${op}" style="cursor:pointer" onmousedown="startDragNode(event,'${node.id}')">`;
        svgContent += `<rect x="${node.x}" y="${node.y}" width="${NW}" height="${NH}" fill="#1C1C1C" stroke="#2A2A2A" stroke-width="1"/>`;
        svgContent += `<rect x="${node.x}" y="${node.y}" width="3" height="${NH}" fill="${lc}"/>`;
        svgContent += `<text x="${node.x + 12}" y="${node.y + 20}" fill="#F5F5F5" font-size="13" font-weight="600" font-family="'IBM Plex Sans','Helvetica Neue',sans-serif">${node.name}</text>`;
        svgContent += `<text x="${node.x + 12}" y="${node.y + 36}" fill="#999" font-size="11" font-family="'IBM Plex Mono',monospace">${node.desc}</text>`;
        if (hasComment) {
          svgContent += `<rect x="${node.x + NW - 12}" y="${node.y + 4}" width="8" height="8" fill="#FF3D00"/>`;
        }
        svgContent += `</g>`;
      }

      // Legend
      let ly = H / state.zoom - 100 + (-state.panY / state.zoom);
      let lx = 12 + (-state.panX / state.zoom);
      svgContent += `<g class="legend-g">`;
      svgContent += `<rect x="${lx}" y="${ly}" width="130" height="88" fill="#141414" stroke="#2A2A2A"/>`;
      let i = 0;
      for (const [k, name] of Object.entries(LAYER_NAMES)) {
        svgContent += `<rect x="${lx + 10}" y="${ly + 14 + i * 16}" width="8" height="8" fill="${LAYER_COLORS[k]}"/>`;
        svgContent += `<text x="${lx + 24}" y="${ly + 22 + i * 16}" fill="#999" font-size="10" font-weight="500" font-family="'IBM Plex Mono',monospace">${name}</text>`;
        i++;
      }
      svgContent += `</g>`;

      svgEl.innerHTML = svgContent;

      container.querySelectorAll('.node').forEach(g => {
        g.addEventListener('click', (e) => {
          if (draggingNode) return;
          openCommentModal(g.dataset.id);
        });
      });
    }

    function startDragNode(e, id) {
      const node = NODES.find(n => n.id === id);
      const svg = document.querySelector('svg');
      const pt = svg.createSVGPoint();
      pt.x = e.clientX; pt.y = e.clientY;
      const startP = pt.matrixTransform(svg.getScreenCTM().inverse());
      const startNodeX = node.x;
      const startNodeY = node.y;
      e.stopPropagation();

      const onMove = (ev) => {
        if (Math.abs(ev.clientX - e.clientX) > 3 || Math.abs(ev.clientY - e.clientY) > 3) {
          draggingNode = node;
        }
        const pt2 = svg.createSVGPoint();
        pt2.x = ev.clientX; pt2.y = ev.clientY;
        const currentP = pt2.matrixTransform(svg.getScreenCTM().inverse());
        node.x = startNodeX + (currentP.x - startP.x);
        node.y = startNodeY + (currentP.y - startP.y);
        renderSVG();
      };
      const onUp = () => {
        setTimeout(() => { draggingNode = null; }, 50);
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }

    // Panning
    const svgContainer = document.getElementById('svg-container');
    svgContainer.addEventListener('mousedown', (e) => {
      if (e.target.closest('.node')) return;
      isPanning = true; panStartX = e.clientX - state.panX; panStartY = e.clientY - state.panY;
      svgContainer.classList.add('grabbing');
    });
    document.addEventListener('mousemove', (e) => {
      if (!isPanning) return;
      state.panX = e.clientX - panStartX; state.panY = e.clientY - panStartY;
      renderSVG();
    });
    document.addEventListener('mouseup', () => {
      isPanning = false; svgContainer.classList.remove('grabbing');
    });

    function openCommentModal(nodeId) {
      const node = NODES.find(n => n.id === nodeId);
      const existing = state.comments[nodeId] || '';
      const overlay = document.createElement('div');
      overlay.className = 'overlay';
      const modal = document.createElement('div');
      modal.className = 'comment-modal';
      modal.innerHTML = `<h3>Comment on: ${node.name}</h3><textarea id="modal-text">${existing}</textarea><div class="modal-actions"><button class="cancel-btn" onclick="closeModal()">Cancel</button><button class="save-btn" onclick="saveComment('${nodeId}')">Save</button></div>`;
      document.body.appendChild(overlay);
      document.body.appendChild(modal);
      overlay.onclick = closeModal;
      document.getElementById('modal-text').focus();
    }

    window.closeModal = function() {
      document.querySelector('.overlay')?.remove();
      document.querySelector('.comment-modal')?.remove();
    };

    window.saveComment = function(nodeId) {
      const text = document.getElementById('modal-text').value.trim();
      if (text) state.comments[nodeId] = text;
      else delete state.comments[nodeId];
      closeModal();
      updateAll();
    };

    function renderComments() {
      const list = document.getElementById('comments-list');
      const entries = Object.entries(state.comments);
      if (entries.length === 0) {
        list.innerHTML = '<p class="no-comments">Click a node to add a comment.</p>';
        return;
      }
      list.innerHTML = entries.map(([id, text]) => {
        const node = NODES.find(n => n.id === id);
        return `<div class="comment-card" onclick="highlightNode('${id}')"><button class="delete-btn" onclick="event.stopPropagation(); deleteComment('${id}')">&times;</button><div class="node-name">${node.name}</div><div class="comment-text">${text}</div></div>`;
      }).join('');
    }

    window.deleteComment = function(id) {
      delete state.comments[id];
      updateAll();
    };

    window.highlightNode = function(id) {
      const g = document.querySelector(`.node[data-id="${id}"]`);
      if (g) {
        const rect = g.querySelector('rect');
        const orig = rect.getAttribute('stroke');
        rect.setAttribute('stroke', '#FF3D00'); rect.setAttribute('stroke-width', '3');
        setTimeout(() => { rect.setAttribute('stroke', orig); rect.setAttribute('stroke-width', '1'); }, 1200);
      }
    };

    function updatePrompt() {
      const visibleLayers = Object.entries(state.layers).filter(([,v]) => v).map(([k]) => LAYER_NAMES[k]);
      const hiddenLayers = Object.entries(state.layers).filter(([,v]) => !v).map(([k]) => LAYER_NAMES[k]);
      const visibleConns = Object.entries(state.connections).filter(([,v]) => v).map(([k]) => CONN_STYLES[k].label);
      const comments = Object.entries(state.comments);

      const parts = [];
      if (hiddenLayers.length > 0 && visibleLayers.length < 5) {
        parts.push(`The system architecture focuses on the ${visibleLayers.join(', ')} layer${visibleLayers.length > 1 ? 's' : ''}.`);
      } else {
        parts.push('The full system architecture is shown.');
      }

      for (const [layerKey, visible] of Object.entries(state.layers)) {
        if (!visible) continue;
        const layerNodes = NODES.filter(n => n.layer === layerKey);
        if (layerNodes.length > 0) {
          parts.push(`The ${LAYER_NAMES[layerKey]} layer includes: ${layerNodes.map(n => n.name).join(', ')}.`);
        }
      }

      if (comments.length > 0) {
        for (const [id, text] of comments) {
          const node = NODES.find(n => n.id === id);
          parts.push(`${node.name} (note: ${text}).`);
        }
      }

      if (visibleConns.length < 4) {
        parts.push(`Visible connection types: ${visibleConns.join(', ')}.`);
      }

      document.getElementById('prompt-text').textContent = parts.length > 1 ? parts.join(' ') : 'Full system architecture view — no annotations or focus applied.';
    }

    function copyPrompt() {
      const text = document.getElementById('prompt-text').textContent;
      const btn = document.getElementById('copy-btn');
      const done = () => { btn.textContent = '✓ COPIED'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 1500); };
      const fallback = () => { const t = document.createElement('textarea'); t.value = text; t.style.cssText = 'position:fixed;opacity:0'; document.body.appendChild(t); t.focus(); t.select(); try { document.execCommand('copy'); done(); } catch(e){} document.body.removeChild(t); };
      if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(done).catch(fallback);
      else fallback();
    }

    function updateAll() { renderSVG(); renderComments(); updatePrompt(); }

    function showPanel(name) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('panel-' + name).classList.add('active');
      document.querySelector(`.panel-tab[data-panel="${name}"]`).classList.add('active');
      document.body.dataset.activePanel = name;
    }

    buildPresets();
    buildControls();
    renderSVG();
    renderComments();
    updatePrompt();
    window.addEventListener('resize', renderSVG);
  </script>
</body>
</html>
